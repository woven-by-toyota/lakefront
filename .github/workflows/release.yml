name: NPM Release

on:
  release:
    types: [released, prereleased]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      # Update version for prereleases (releases already have correct version in package.json)
      - name: Update version for prerelease
        if: github.event.release.prerelease == true
        run: npm version ${{ github.event.release.tag_name }} --no-git-tag-version --allow-same-version

      - run: npm run build

      # Publish with beta tag for prereleases, latest tag for releases
      - name: Publish to npm
        run: |
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
